<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Report Lost Item</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">

</head>

<body class="bg-gray-100">
<header>
    <h1 class="text-center text-3xl font-bold text-indigo-600 mt-8">
        LostLink
    </h1>
</header>

<main>

<div class="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">

    <h1 class="text-3xl font-bold text-center text-indigo-600 mb-6">
        Report Lost Item
    </h1>

    <!-- Item Name -->
    <div class="mb-4">
        <label class="font-semibold">Item Name</label>
        <input
            type="text"
            id="itemName"
            class="w-full border p-2 rounded mt-1"
            placeholder="Enter item name">
    </div>

    <!-- Description -->
    <div class="mb-4">
        <label class="font-semibold">Description</label>
        <textarea
            id="description"
            class="w-full border p-2 rounded mt-1"
            rows="4"
            placeholder="Describe your lost item"></textarea>
    </div>

    <!-- Location -->
    <div class="mb-4">
        <label class="font-semibold">Location</label>

        <div class="flex gap-2 mt-1">
            <input
                type="text"
                id="location"
                class="w-full border p-2 rounded"
                placeholder="Location">

            <button
                onclick="getLocation()"
                class="bg-indigo-600 text-white px-4 rounded">
                Detect
            </button>
        </div>
    </div>

    <!-- Voice Search -->
    <div class="mb-6">
        <label class="font-semibold">Voice Input</label>

        <div class="flex gap-2 mt-1">

            <input
                type="text"
                id="voiceText"
                class="w-full border p-2 rounded"
                placeholder="Speak item name">

            <button
                onclick="voiceInput()"
                class="bg-green-600 text-white px-4 rounded">
                🎤
            </button>

        </div>
    </div>

    <!-- File Upload -->
    <div class="mb-6">
        <label class="font-semibold">
            Upload Item Image
        </label>

        <input
            type="file"
            id="imageInput"
            class="block mt-2">

        <img
            id="preview"
            class="mt-4 rounded-lg hidden w-64">
    </div>

    <!-- Drag & Drop -->
    <div
        id="dropZone"
        class="drop-zone mb-6">

        Drag & Drop Image Here

    </div>

    <!-- Save Button -->
    <button
    onclick="saveReport()"
    class="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700">
    Submit Report
</button>
<a href="my_reports.html"
class="bg-green-600 text-white px-6 py-3 rounded-lg ml-3">
View Reports
</a>

</div>

<script>

/*  Geolocation API */

function getLocation() {

    if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(

            function(position) {

                document.getElementById("location").value =
                    position.coords.latitude +
                    ", " +
                    position.coords.longitude;

            },

            function() {
                alert("Unable to retrieve location.");
            }

        );
    }
}

/* Local Storage API */

function saveReport() {

    const itemName =
        document.getElementById("itemName").value;

    const description =
        document.getElementById("description").value;

    const location =
        document.getElementById("location").value;

     if(itemName==""){
    alert("Please enter item name");
    return;
}


if(description==""){
    alert("Please enter description");
    return;
}


if(location==""){
    alert("Please enter location");
    return;
}

let reports = JSON.parse(
localStorage.getItem("reports")
) || [];

reports.push({
itemName,
description,
location
});

localStorage.setItem(
"reports",
JSON.stringify(reports)
);

    alert("Report Saved Successfully!");

    showNotification();
}

/* File API */

document
.getElementById("imageInput")
.addEventListener("change", function() {

    const file = this.files[0];

    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {

        const preview =
            document.getElementById("preview");

        preview.src = e.target.result;
        preview.classList.remove("hidden");
    };

    reader.readAsDataURL(file);
});

/* Notification API */

function showNotification() {

    if ("Notification" in window) {

        Notification.requestPermission()
            .then(function(permission) {

                if (permission === "granted") {

                    new Notification(
                        "LostLink",
                        {
                            body:
                            "Your lost item report has been submitted."
                        }
                    );
                }
            });
    }
}

/* Drag and Drop API */

const dropZone =
document.getElementById("dropZone");

dropZone.addEventListener(
    "dragover",
    function(e) {

        e.preventDefault();

        dropZone.classList.add("dragover");
    }
);

dropZone.addEventListener(
    "dragleave",
    function() {

        dropZone.classList.remove("dragover");
    }
);

dropZone.addEventListener(
    "drop",
    function(e) {

        e.preventDefault();

        dropZone.classList.remove("dragover");

        const file =
        e.dataTransfer.files[0];

        if(file){

            const reader =
            new FileReader();

            reader.onload =
            function(event){

                const preview =
                document.getElementById("preview");

                preview.src =
                event.target.result;

                preview.classList.remove("hidden");
            };

            reader.readAsDataURL(file);
        }
    }
);

/* Web Speech API */

function voiceInput() {

    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    if (!SpeechRecognition) {

        alert(
            "Speech Recognition not supported in this browser."
        );

        return;
    }

    const recognition =
        new SpeechRecognition();

    recognition.start();

    recognition.onresult =
    function(event) {

        document.getElementById("voiceText").value =
            event.results[0][0].transcript;
    };
}

</script>
</div>
</main>
<footer class="text-center text-gray-500 py-5">
    © 2026 LostLink
</footer>
</body>
</html>
