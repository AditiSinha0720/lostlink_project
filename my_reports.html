<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reports</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-100">

<nav class="bg-indigo-600 text-white p-4 sticky top-0">

    <div class="max-w-6xl mx-auto flex justify-between items-center">

        <h1 class="text-2xl font-bold">
            LostLink
        </h1>

        <ul class="hidden md:flex gap-6">

    <li>
        <a href="index.html" class="hover:text-gray-200">
            Home
        </a>
    </li>

    <li>
        <a href="report_items.html" class="hover:text-gray-200">
            Report Item
        </a>
    </li>

    <li>
        <a href="browse_items.html" class="hover:text-gray-200">
            Browse Items
        </a>
    </li>

    <li>
        <a href="my_reports.html" class="hover:text-gray-200">
            My Reports
        </a>
    </li>

    <li>
        <a href="#contact" class="hover:text-gray-200">
            Contact
        </a>
    </li>

</ul>

    </div>

</nav>

<main>

<div class="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">
        <h1 class="text-3xl font-bold text-center text-indigo-600 mb-8">
            My Reports
        </h1>

        <div id="reportsContainer">
        </div>
    </div>

    <script>

        let reports = JSON.parse(
            localStorage.getItem("reports")
        ) || [];

        let container = document.getElementById("reportsContainer");

        if (reports.length == 0) {

            container.innerHTML = "<p class='text-center text-gray-500'>No Reports Found</p>";
        }
       else {

            reports.forEach(function (report) {

                container.innerHTML += `

<div class="bg-white p-6 rounded-xl shadow mb-4">

    ${report.image ? `
    <img
src="${report.image}"
class="w-64 h-64 object-contain rounded-lg mx-auto mb-4 bg-gray-100">
    ` : ""}

    <h2 class="text-xl font-bold">
        ${report.itemName}
    </h2>

    <p class="mt-2">
        ${report.description}
    </p>

    <p class="mt-2 text-indigo-600">
        📍 ${report.location}
    </p>

    <span class="
inline-block mt-3 px-3 py-1 rounded-full text-sm
${report.status=="Lost"
?
'bg-red-100 text-red-600'
:
'bg-green-100 text-green-600'
}">

${report.status}

</span>

</div>

`;
            });
        }
    </script>
    </div>

</main>

<footer class="bg-gray-900 text-white py-8 mt-10">

<div class="max-w-6xl mx-auto text-center">

<h2 class="text-2xl font-bold mb-4">LostLink</h2>

<div class="flex justify-center gap-6 text-2xl mb-4">

<a href="#">Facebook</a>
<a href="#">Instagram</a>
<a href="#">LinkedIn</a>

</div>
<p class="text-gray-400">© 2026 LostLink. All rights reserved.</p>
</div>

</footer>
</body>
</html>
